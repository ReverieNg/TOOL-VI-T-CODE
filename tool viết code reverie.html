    function buildTemplate(lang, params) {

            python: `# AimLock - Python (VIP)\nimport time, random, threading\nimport pyautogui, pynput, mss, numpy as np\nfrom PIL import Image\n\nclass AimLock:\n    def __init__(self):\n        self.running = True\n        self.enabled = True\n        self.headshot = ${headshot}\n        self.prev = None\n        self.fov = ${fov}\n        self.threshold = ${threshold}\n        self.smooth = ${smooth}\n        self.delay_min = ${delayMin}\n        self.delay_max = ${delayMax}\n        sw, sh = pyautogui.size()\n        self.left = int(sw * ${l})\n        self.top = int(sh * ${t})\n        self.w = int(sw * ${w})\n        self.h = int(sh * ${h})\n\n    def capture(self):\n        with mss.mss() as sct:\n            img = sct.grab({"left": self.left, "top": self.top,\n                            "width": self.w, "height": self.h})\n            return np.array(img)\n\n    def detect(self, curr):\n        if self.prev is None:\n            self.prev = curr; return None\n        diff = np.sum(np.abs(curr.astype(np.int16) - self.prev.astype(np.int16)), axis=2)\n        mask = diff > self.threshold\n        if not np.any(mask):\n            self.prev = curr; return None\n        ys, xs = np.where(mask)\n        cx, cy = self.w//2, self.h//2\n        best = None\n        for x, y in zip(xs, ys):\n            d = (x-cx)**2 + (y-cy)**2\n            if d < self.fov**2 and (best is None or d < best[0]):\n                best = (d, x, y)\n        self.prev = curr\n        if best: return (best[1], best[2])\n        return None\n\n    def action(self, x, y):\n        if self.headshot:\n            y = max(0, y - 30)\n        px, py = pyautogui.position()\n        dx = int((self.left + x - px) * self.smooth)\n        dy = int((self.top + y - py) * self.smooth)\n        pyautogui.move(dx, dy, relative=True)\n        pyautogui.click()\n        time.sleep((self.delay_min + random.random()*(self.delay_max-self.delay_min))/1000.0)\n\n    def loop(self):\n        while self.running:\n            if pynput.keyboard.KeyCode.from_vk(0x70).is_pressed():\n                time.sleep(0.2); self.enabled = not self.enabled\n            if pynput.keyboard.KeyCode.from_vk(0x71).is_pressed():\n                self.running = False; break\n            if pynput.keyboard.KeyCode.from_vk(0x72).is_pressed():\n                time.sleep(0.2); self.headshot = not self.headshot\n            if self.enabled:\n                img = self.capture()\n                target = self.detect(img)\n                if target:\n                    self.action(target[0], target[1])\n            time.sleep(0.016)\n\nif __name__ == "__main__":\n    aim = AimLock()\n    aim.loop()`,

            ruby:`# AimLock - Ruby (VIP)\nrequire 'win32/api'\nrequire 'win32/screenshot'\nrequire 'io/console'\n\nmodule Win32\n  class API\n    def self.GetAsyncKeyState(vk)\n      api = Win32::API.new('GetAsyncKeyState', 'I', 'S')\n      api.call(vk) & 0x8000 != 0\n    end\n  end\nend\n\nclass AimLock\n  def initialize\n    @running = true\n    @enabled = true\n    @headshot = ${headshot}\n    @fov = ${fov}\n    @threshold = ${threshold}\n    @smooth = ${smooth}\n    @delay_min = ${delayMin}\n    @delay_max = ${delayMax}\n    sw, sh = Windows::Screenshot.screen_size\n    @left = (sw * ${l}).to_i\n    @top = (sh * ${t}).to_i\n    @w = (sw * ${w}).to_i\n    @h = (sh * ${h}).to_i\n    @prev = nil\n  end\n\n  def capture\n    Windows::Screenshot.grab_area(@left, @top, @w, @h).to_rgb\n  end\n\n  def detect(curr)\n    return nil if @prev.nil?\n    cx, cy = @w/2, @h/2\n    fov2 = @fov*@fov\n    best = Float::INFINITY\n    bx, by = nil\n    (0...@h).each do |y|\n      (0...@w).each do |x|\n        idx = (y*@w + x)*3\n        diff = (curr[idx]-@prev[idx]).abs + (curr[idx+1]-@prev[idx+1]).abs + (curr[idx+2]-@prev[idx+2]).abs\n        if diff > @threshold\n          dx = x-cx; dy = y-cy\n          d = dx*dx + dy*dy\n          if d < fov2 && d < best\n            best = d; bx = x; by = y\n          end\n        end\n      end\n    end\n    @prev = curr\n    return {x:bx, y:by} if bx\n    nil\n  end\n\n  def action(target)\n    y = target[:y]\n    y = [y-30, 0].max if @headshot\n    pt = Win32::API::GetCursorPos\n    dx = ((@left + target[:x] - pt[:x]) * @smooth).to_i\n    dy = ((@top + y - pt[:y]) * @smooth).to_i\n    Win32::API::SetCursorPos(pt[:x]+dx, pt[:y]+dy)\n    Win32::API::mouse_event(MOUSEEVENTF_LEFTDOWN, 0,0,0,0)\n    sleep(0.01)\n    Win32::API::mouse_event(MOUSEEVENTF_LEFTUP, 0,0,0,0)\n    sleep(rand(@delay_min..@delay_max)/1000.0)\n  end\n\n  def loop\n    while @running\n      if Win32::API.GetAsyncKeyState(0x70)\n        sleep(0.2); @enabled = !@enabled\n             swift: `// AimLock - Swift (macOS, VIP)\nimport Cocoa\nimport CoreGraphics\n\nclass AimLock {\n    var running = true, enabled = true, headshot = ${headshot}\n    var fov = ${fov}, threshold = ${threshold}\n    var smooth = ${smooth}\n    var delayMin = ${delayMin}, delayMax = ${delayMax}\n    var left, top, w, h: Int\n    var prev: [UInt8]? = nil\n    let screen = NSScreen.main!.frame\n\n    init() {\n        let sw = Int(screen.width), sh = Int(screen.height)\n        left = Int(Double(sw) * ${l}); top = Int(Double(sh) * ${t})\n        w = Int(Double(sw) * ${w}); h = Int(Double(sh) * ${h})\n    }\n\n    func isKeyPressed(_ key: CGKeyCode) -> Bool {\n        return CGEventSource.keyState(.combinedSessionState, key: key)\n    }\n\n    func capture() -> [UInt8] {\n        let image = CGImage.capture(rect: CGRect(x: left, y: top, width: w, height: h))\n        let rep = NSBitmapImageRep(cgImage: image)\n        return rep.bitmapData!\n    }\n\n    func detect(_ curr: [UInt8]) -> (Int, Int)? {\n        guard let prev = prev else { self.prev = curr; return nil }\n        let cx = w/2, cy = h/2, fov2 = fov*fov\n        var best = fov2 + 1, bx = -1, by = -1\n        for y in 0..<h {\n            for x in 0..<w {\n                let idx = (y*w + x)*4\n                let diff = abs(Int(curr[idx]) - Int(prev[idx])) +\n                           abs(Int(curr[idx+1]) - Int(prev[idx+1])) +\n                           abs(Int(curr[idx+2]) - Int(prev[idx+2]))\n                if diff > threshold {\n                    let dx = x - cx, dy = y - cy, d = dx*dx + dy*dy\n                    if d < fov2 && d < best {\n                        best = d; bx = x; by = y\n                    }\n                }\n            }\n        }\n        self.prev = curr\n        if bx != -1 { return (bx, by) }\n        return nil\n    }\n\n    func action(_ target: (Int, Int)) {\n        var y = target.1\n        if headshot { y = max(0, y - 30) }\n        var mouse = NSEvent.mouseLocation\n        let dx = Int((Double(left + target.0) - Double(mouse.x)) * smooth)\n        let dy = Int((Double(top + y) - Double(mouse.y)) * smooth)\n        CGWarpMouseCursorPosition(CGPoint(x: mouse.x + CGFloat(dx), y: mouse.y + CGFloat(dy)))\n        let click = CGEvent(mouseEventSource: nil, mouseType: .leftMouseDown, mouseCursorPosition: .zero, mouseButton: .left)\n        click?.post(tap: .cghidEventTap)\n        usleep(10000)\n        let clickUp = CGEvent(mouseEventSource: nil, mouseType: .leftMouseUp, mouseCursorPosition: .zero, mouseButton: .left)\n        clickUp?.post(tap: .cghidEventTap)\n        let delay = UInt32(Int.random(in: delayMin...delayMax) * 1000)\n        usleep(delay)\n    }\n\n    func loop() {\n        while running {\n            if isKeyPressed(0x7A) { usleep(200000); enabled = !enabled }\n            if isKeyPressed(0x78) { running = false; break }\n            if isKeyPressed(0x79) { usleep(200000); headshot = !headshot }\n            if enabled {\n                let curr = capture()\n                if let target = detect(curr) {\n                    action(target)\n                }\n            }\n            usleep(16000)\n        }\n    }\n}\n\nAimLock().loop()`,

            kotlin: `// AimLock - Kotlin (Android, VIP)\nimport android.graphics.*\nimport android.os.Handler\nimport android.os.Looper\nimport java.util.*\n\nclass AimLock {\n    private var running = true\n    private var enabled = true\n    private var headshot = ${headshot}\n    private val fov = ${fov}\n    private val threshold = ${threshold}\n    private val smooth = ${smooth}\n    private val delayMin = ${delayMin}\n    private val delayMax = ${delayMax}\n    private val left: Int, top: Int, w: Int, h: Int\n    private var prev: Bitmap? = null\n    private val rand = Random()\n    private val handler = Handler(Looper.getMainLooper())\n\n    init {\n        val displayMetrics = Resources.getSystem().displayMetrics\n        val sw = displayMetrics.widthPixels\n        val sh = displayMetrics.heightPixels\n        left = (sw * ${l}).toInt()\n        top = (sh * ${t}).toInt()\n        w = (sw * ${w}).toInt()\n        h = (sh * ${h}).toInt()\n    }\n\n    private fun capture(): Bitmap {\n        val displayMetrics = Resources.getSystem().displayMetrics\n        val screen = ScreenCapture.capture()\n        return Bitmap.createBitmap(screen, left, top, w, h)\n    }\n\n    private fun detect(curr: Bitmap): Point? {\n        if (prev == null) { prev = curr.copy(Bitmap.Config.ARGB_8888, false)!!; return null }\n        val cx = w/2; val cy = h/2; val fov2 = fov*fov\n        var best = Double.MAX_VALUE\n        var bestPt: Point? = null\n        for (y in 0 until h) {\n            for (x in 0 until w) {\n                val p1 = curr.getPixel(x, y)\n                val p2 = prev!!.getPixel(x, y)\n                val diff = Math.abs(Color.red(p1)-Color.red(p2)) +\n                           Math.abs(Color.green(p1)-Color.green(p2)) +\n                           Math.abs(Color.blue(p1)-Color.blue(p2))\n                if (diff > threshold) {\n                    val dx = x - cx; val dy = y - cy\n                    val d = (dx*dx + dy*dy).toDouble()\n                    if (d < fov2 && d < best) {\n                        best = d; bestPt = Point(x, y)\n                    }\n                }\n            }\n        }\n        prev = curr.copy(Bitmap.Config.ARGB_8888, false)!!\n        return bestPt\n    }\n\n    private fun action(target: Point) {\n        var y = target.y\n        if (headshot) y = Math.max(0, y - 30)\n        val absX = left + target.x\n        val absY = top + y\n        runShell("input tap $absX $absY")\n        val delay = rand.nextInt(delayMax - delayMin + 1) + delayMin\n        Thread.sleep(delay.toLong())\n    }\n\n    private fun runShell(cmd: String) {\n        try {\n            Runtime.getRuntime().exec(arrayOf("sh", "-c", cmd))\n        } catch (_: Exception) {}\n    }\n\n    fun loop() {\n        while (running) {\n            if (File("/sdcard/toggle.txt").exists()) {\n                File("/sdcard/toggle.txt").delete()\n                enabled = !enabled\n            }\n            if (File("/sdcard/exit.txt").exists()) {\n                File("/sdcard/exit.txt").delete()\n                running = false\n                break\n            }\n            if (enabled) {\n                val curr = capture()\n                val target = detect(curr)\n                if (target != null) action(target)\n            }\n            Thread.sleep(16)\n        }\n    }\n}\n\nfun main() {\n    AimLock().loop()\n}`

    }

    // ================================================================
    // DOM LOGIC
    // ================================================================
    const langSelect = document.getElementById('langSelect');
    const generateBtn = document.getElementById('generateBtn');
    const copyBtn = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const codeDisplay = document.getElementById('codeDisplay');
    const langLabel = document.getElementById('langLabel');
    const langBadge = document.getElementById('langBadge');
    const toast = document.getElementById('toast');
const fovInput = document.getElementById('fovInput');
    const thresholdInput = document.getElementById('thresholdInput');
    const smoothRange = document.getElementById('smoothRange');
    const smoothVal = document.getElementById('smoothVal');
    const delayMin = document.getElementById('delayMin');
    const delayMax = document.getElementById('delayMax');
    const headshotSelect = document.getElementById('headshotSelect');
    const regionSelect = document.getElementById('regionSelect');

    const gameBtns = document.querySelectorAll('.game-btn');

    smoothRange.addEventListener('input', () => {
        smoothVal.textContent = parseFloat(smoothRange.value).toFixed(2);
    });

    const gamePresets = {
        freefire: { fov: 280, threshold: 25, smooth: 0.5, delayMin: 20, delayMax: 60, headshot: true, region: '0.30,0.30,0.40,0.40' },
        pubg: { fov: 300, threshold: 35, smooth: 0.45, delayMin: 40, delayMax: 90, headshot: false, region: '0.33,0.33,0.34,0.34' },
        csgo: { fov: 220, threshold: 20, smooth: 0.35, delayMin: 10, delayMax: 40, headshot: true, region: '0.35,0.30,0.30,0.40' },
        valorant: { fov: 200, threshold: 18, smooth: 0.3, delayMin: 5, delayMax: 30, headshot: true, region: '0.38,0.32,0.24,0.36' },
        default: { fov: 250, threshold: 30, smooth: 0.4, delayMin: 30, delayMax: 80, headshot: false, region: '0.33,0.33,0.34,0.34' }
    };

    gamePresets.forEach = function() {}; // Safe fallback

    gameBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            gameBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const game = btn.dataset.game;
            const preset = gamePresets[game] || gamePresets.default;
            fovInput.value = preset.fov;
            thresholdInput.value = preset.threshold;
            smoothRange.value = preset.smooth;
            smoothVal.textContent = preset.smooth.toFixed(2);
            delayMin.value = preset.delayMin;
            delayMax.value = preset.delayMax;
            headshotSelect.value = preset.headshot ? 'true' : 'false';
            const regionStr = preset.region;
            for (let opt of regionSelect.options) {
                if (opt.value === regionStr) { regionSelect.value = regionStr; break; }
            }
        });
    });
    function generateCode() {
        const lang = langSelect.value;
        const params = {
            fov: parseInt(fovInput.value) || 250,
            threshold: parseInt(thresholdInput.value) || 30,
            smooth: parseFloat(smoothRange.value) || 0.4,
            delayMin: parseInt(delayMin.value) || 30,
            delayMax: parseInt(delayMax.value) || 80,
            headshot: headshotSelect.value === 'true',
            region: regionSelect.value
        };
        const code = buildTemplate(lang, params);
        codeDisplay.textContent = code;
        const langMap = {
            python: '🐍 Python', cpp: '⚙️ C++', csharp: '🖥️ C#',
            rust: '🦀 Rust', java: '☕ Java', nodejs: '🟢 Node.js',
            go: '🐹 Go', ruby: '💎 Ruby', swift: '🐦 Swift', kotlin: '📱 Kotlin'
        };
        const label = langMap[lang] || lang;
        langLabel.textContent = label;
        langBadge.textContent = label;
    }

    function copyCode() {
        const text = codeDisplay.textContent;
        if (!text || text.includes('// Chọn ngôn ngữ')) {
            toast.textContent = '⚠️ Chưa có code';
            toast.className = 'toast error show';
            setTimeout(() => toast.classList.remove('show'), 1500);
            return;
        }
        navigator.clipboard.writeText(text).then(() => {
            toast.textContent = '✅ Đã sao chép!';
            toast.className = 'toast show';
            setTimeout(() => toast.classList.remove('show'), 1500);
        }).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            toast.textContent = '✅ Đã sao chép!';
            toast.className = 'toast show';
            setTimeout(() => toast.classList.remove('show'), 1500);
        });
    }
    function downloadCode() {
        const text = codeDisplay.textContent;
        if (!text || text.includes('// Chọn ngôn ngữ')) {
            toast.textContent = '⚠️ Chưa có code để tải';
            toast.className = 'toast error show';
            setTimeout(() => toast.classList.remove('show'), 1500);
            return;
        }
        const lang = langSelect.value;
        const extMap = {
            python: 'py', cpp: 'cpp', csharp: 'cs', rust: 'rs',
            java: 'java', nodejs: 'js', go: 'go', ruby: 'rb',
            swift: 'swift', kotlin: 'kt'
        };
        const ext = extMap[lang] || 'txt';
        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `aimlock_${lang}.${ext}`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function clearCode() {
        codeDisplay.textContent = '// Chọn ngôn ngữ và nhấn "Tạo Code"';
        langLabel.textContent = 'Chưa chọn';
        langBadge.textContent = '--';
    }

    generateBtn.addEventListener('click', generateCode);
    copyBtn.addEventListener('click', copyCode);
    downloadBtn.addEventListener('click', downloadCode);
    clearBtn.addEventListener('click', clearCode);
    langSelect.addEventListener('change', generateCode);

    window.addEventListener('load', () => {
        generateCode();
    });
    
    // ==========================================
    // XỬ LÝ KHÓA KEY QUA GITHUB (UPDATE HẰNG NGÀY)
    // ==========================================
    const keyWrapper = document.getElementById('keyWrapper');
    const mainContainer = document.getElementById('mainContainer');
    const keyInput = document.getElementById('keyInput');
    const submitKeyBtn = document.getElementById('submitKeyBtn');

    // ĐƯỜNG DẪN ĐẾN FILE KEY RAW TRÊN GITHUB CỦA BẠN
    const GITHUB_KEY_URL = "https://raw.githubusercontent.com/ReverieNg/reverie-keys/refs/heads/main/Key.txt";

    async function checkKey() {
        const userKey = keyInput.value.trim();
        if (!userKey) {
            alert("❌ Vui lòng nhập key!");
            return;
        }

        submitKeyBtn.disabled = true;
        submitKeyBtn.textContent = "Đang kiểm tra...";

        try {
            // Gọi và lấy dữ liệu key từ GitHub về (thêm timestamp để tránh cache cũ)
            const response = await fetch(`${GITHUB_KEY_URL}?t=${new Date().getTime()}`);
            
            if (!response.ok) {
                throw new Error("Không thể kết nối đến máy chủ chứa key.");
            }

            const correctKey = (await response.text()).trim();

            if (userKey === correctKey) {
                alert("🎉 Key hợp lệ! Giao diện đã được mở.");
                keyWrapper.style.display = "none";     // Ẩn màn hình nhập key
                mainContainer.style.display = "block"; // Hiển thị giao diện chính
                
                // Tự động tạo code ban đầu
                if (typeof generateCode === "function") {
                    generateCode();
                }
            } else {
                alert("❌ Key không chính xác hoặc đã hết hạn!");
            }
        } catch (error) {
            console.error(error);
            alert("❌ Lỗi hệ thống: " + error.message);
        } finally {
            submitKeyBtn.disabled = false;
            submitKeyBtn.textContent = "XÁC NHẬN KEY";
        }
    }

    // Lắng nghe sự kiện click nút bấm và phím Enter
    if (submitKeyBtn) submitKeyBtn.addEventListener('click', checkKey);
    if (keyInput) {
        keyInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkKey();
            }
        });
    }
</script>
